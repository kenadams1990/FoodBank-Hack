<!-- @dsCard group="Colors" viewport="700x150" name="Salmon Discipline" subtitle="One signal per screen — not a wash" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{height:150px;background:var(--bg-page);display:flex;align-items:center;gap:20px;padding:0 24px;box-sizing:border-box}.panel{background:var(--surface-panel);padding:16px;flex:1;display:flex;gap:10px;align-items:center}.btn{font-family:var(--font-mono);font-size:13px;font-weight:600;padding:9px 16px;border:none;cursor:pointer}.ok{background:var(--salmon);color:var(--ink)}.ghost{background:transparent;color:var(--foam);border:1px solid var(--line-strong)}.note{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);max-width:210px;line-height:1.5}</style></head><body>
<div class="panel"><button class="btn ok">Review recommendation</button><button class="btn ghost">View audit trail</button></div>
<p class="note">Salmon is a signal light: one call to action per screen. Hover lightens to #EF7D66. No gradients, shadows, or glow.</p>
</body></html>
