<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{height:150px;background:var(--bg-page);display:flex;align-items:center;gap:36px;padding:0 32px;box-sizing:border-box;color:var(--text-primary)}.stat .v{font-family:var(--font-display);font-weight:700;font-size:42px;line-height:1}.stat .l{font-family:var(--font-mono);font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-tertiary);margin-top:6px}.arr{font-family:var(--font-mono);font-size:24px;color:var(--text-tertiary)}</style></head><body>
