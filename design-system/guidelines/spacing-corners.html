<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{height:150px;background:var(--bg-page);display:flex;align-items:center;gap:18px;padding:0 28px;box-sizing:border-box}.c{width:120px;height:86px;background:var(--surface-panel);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font-family:var(--font-mono);font-size:10.5px;color:var(--text-tertiary)}.note{font-family:var(--font-mono);font-size:11.5px;color:var(--text-secondary);line-height:1.6;flex:1}</style></head><body>
<div class="c">radius 0</div>
<div class="c" style="border-radius:2px;border:1px solid var(--line)">2px + hairline</div>
<div class="c" style="border-radius:4px;border:1px solid var(--line-strong)">4px max</div>
<p class="note">Flat and precise. Shadows, gradients and glassmorphism are forbidden. Structure comes from 1px rgba(foam,.08) hairlines.</p>
</body></html>
