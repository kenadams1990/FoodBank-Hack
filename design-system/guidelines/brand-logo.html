<div class="cell" style="background:var(--foam)"><div class="lock"><img src="../assets/logo-slate.svg" width="34" height="34" alt=""><span class="wm" style="color:var(--slate-ink)">TideLift</span></div><span class="compact" style="color:var(--slate-ink);opacity:.6">TIDELIFT</span></div>
