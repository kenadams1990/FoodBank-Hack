name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agents-tests:
    name: apps/agents vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install
      - name: Run agent tests
        run: npm run test

  # NOTE: apps/web build + svelte-check are intentionally not run yet — they
  # need the pnpm workspace + @tidelift/shared package (issues #5, #6). Add a
  # web-build job here once those land so CI covers the dashboard too.
